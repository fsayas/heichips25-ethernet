# LibreLane configuration file

DESIGN_NAME: heichips25_ethernet
#VERILOG_FILES: dir::../src/heichips25_template.sv
VERILOG_FILES:
 - dir::../src/heichips25_ethernet.sv
 - dir::../src/phy.v

CLOCK_PORT: clk
CLOCK_PERIOD: 10 # 10ns = 100MHz

# Reduce wasted space
TOP_MARGIN_MULT: 1
BOTTOM_MARGIN_MULT: 1
LEFT_MARGIN_MULT: 6
RIGHT_MARGIN_MULT: 0

# Absolute die size
FP_SIZING: absolute

# Small DEF template
#DIE_AREA: [0, 0, 500, 200]
#FP_DEF_TEMPLATE: dir::def/heichips25_template_small.def

# Large DEF template
#DIE_AREA: [0, 0, 500, 415]
#FP_DEF_TEMPLATE: dir::def/heichips25_template_large.def

# Ethernet project DEF template
DIE_AREA: [0, 0, 500, 200]
FP_DEF_TEMPLATE: dir::def/heichips25_template_small_ethernet.def

# Don't use power rings or TopMetal2 layer
PDN_MULTILAYER: false
RT_MAX_LAYER: Metal4 #TopMetal1

# Enable for better SystemVerilog support
#USE_SLANG: true


MACROS:
  line_driver:
    gds:
      - dir::macro_analog/line_driver.gds
    lef:
      - dir::macro_analog/line_driver.lef
    instances:
      line_driver_0:
        location: [179.84, 2.47]
        orientation: N

#PDN_MACRO_CONNECTIONS:
#  - "line_driver_0 VPWR VGND VPWR VGND"

FP_PDN_VPITCH: 20

RSZ_DONT_TOUCH_RX: "^ethernet_d[pn]$"

# Custom PDN config
FP_PDN_CFG: dir::pdn_cfg.tcl

FP_PDN_MULTILAYER: false
#FP_PDN_HORIZONTAL_LAYER: Metal5
FP_PDN_HWIDTH: 2.0
FP_PDN_HPITCH: 21.8
FP_PDN_HOFFSET: 0.0
FP_PDN_HSPACING: 0.0

CORE_AREA: [0, 0, 500, 198]

#MAGIC_EXT_UNIQUE: notopports

